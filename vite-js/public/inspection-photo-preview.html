<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inspection Image</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        background: #f5f5f5;
        font-family: Arial, Helvetica, sans-serif;
        color: #212b36;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .page {
        width: 100%;
        max-width: 100%;
        padding: 24px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        width: 100%;
        max-width: 70vw;
        margin: 0 0 20px;
        font-size: 22px;
        font-weight: 700;
        line-height: 1.35;
        text-align: center;
      }
      .image-wrap {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      img {
        display: block;
        width: auto;
        height: auto;
        max-width: 70vw;
        max-height: calc(100vh - 140px);
        object-fit: contain;
        border: 1px solid #dfe3e8;
        background: #fff;
        padding: 8px;
        border-radius: 4px;
      }
      .message {
        padding: 48px 24px;
        font-size: 14px;
        color: #637381;
        text-align: center;
      }
      @media (max-width: 768px) {
        h1 {
          max-width: 100%;
          font-size: 18px;
        }
        img {
          max-width: min(70vw, 100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="page" id="root">
      <p class="message">Loading image preview…</p>
    </div>
    <script>
      (function () {
        var STORAGE_PREFIX = 'qd-insp-photo:';
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        var root = document.getElementById('root');

        function showMessage(text) {
          root.innerHTML = '<p class="message">' + text + '</p>';
        }

        function cleanupExpiredPreviews() {
          try {
            for (var i = localStorage.length - 1; i >= 0; i -= 1) {
              var key = localStorage.key(i);
              if (!key || key.indexOf(STORAGE_PREFIX) !== 0) continue;
              var raw = localStorage.getItem(key);
              if (!raw) {
                localStorage.removeItem(key);
                continue;
              }
              try {
                var payload = JSON.parse(raw);
                if (payload.expiresAt && Date.now() > payload.expiresAt) {
                  localStorage.removeItem(key);
                }
              } catch (e) {
                localStorage.removeItem(key);
              }
            }
          } catch (e) {
            /* ignore storage cleanup errors */
          }
        }

        cleanupExpiredPreviews();

        if (!id) {
          showMessage('Image preview is not available.');
          return;
        }

        var storageKey = STORAGE_PREFIX + id;
        var raw = null;
        try {
          raw = localStorage.getItem(storageKey);
        } catch (e) {
          showMessage('Unable to load image preview.');
          return;
        }

        if (!raw) {
          showMessage('Image preview expired or is not available. Please reopen the PDF report.');
          return;
        }

        var payload;
        try {
          payload = JSON.parse(raw);
        } catch (e) {
          showMessage('Image preview data is invalid.');
          return;
        }

        if (payload.expiresAt && Date.now() > payload.expiresAt) {
          try {
            localStorage.removeItem(storageKey);
          } catch (e) {
            /* ignore */
          }
          showMessage('Image preview has expired. Please reopen the PDF report.');
          return;
        }

        var caption = typeof payload.caption === 'string' ? payload.caption.trim() : '';
        var src = typeof payload.dataUri === 'string' ? payload.dataUri.trim() : '';

        if (!src) {
          showMessage('Image preview is not available.');
          return;
        }

        document.title = caption || 'Inspection Image';
        root.innerHTML = '';

        if (caption) {
          var heading = document.createElement('h1');
          heading.textContent = caption;
          root.appendChild(heading);
        }

        var imageWrap = document.createElement('div');
        imageWrap.className = 'image-wrap';

        var img = document.createElement('img');
        img.alt = caption || 'Inspection Image';
        img.src = src;
        img.onerror = function () {
          showMessage('Unable to display this image.');
        };

        imageWrap.appendChild(img);
        root.appendChild(imageWrap);
      })();
    </script>
  </body>
</html>
